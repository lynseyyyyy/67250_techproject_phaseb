  <div class="main">
    <h1>Checkout</h1>

    <!-- Phase A insight: checkout errors peaked at step 2 -->
    <!-- Keeping the form simple and clearly labeled reduces errors -->
    <p>Fill in your details below to complete your ticket purchase.</p>

    <form action="#" method="post">

      <label for="name">Full Name</label><br />
      <input type="text" id="name" name="name" required /><br /><br />

      <label for="email">Email Address</label><br />
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="quantity">Ticket Quantity (1–10)</label><br />
      <input type="number" id="quantity" name="quantity" min="1" max="10" required /><br /><br />

      <button type="submit">Place Order</button>

    </form>

  </div>
